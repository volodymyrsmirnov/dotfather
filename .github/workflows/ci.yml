name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check formatting
        run: test -z "$(gofmt -s -l .)"

      - name: Check module tidiness
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Vet
        run: go vet ./...

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest

      - name: Lint
        run: golangci-lint run ./...

      - name: Test
        run: go test -race -coverprofile=coverage.out -covermode=atomic -v ./... 2>&1 | tee test-output.txt

      - name: Test summary
        if: always()
        run: |
          if grep -q "^FAIL" test-output.txt 2>/dev/null; then
            echo "## Tests Failed" >> $GITHUB_STEP_SUMMARY
            grep "^---" test-output.txt >> $GITHUB_STEP_SUMMARY || true
          else
            echo "## All Tests Passed" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Vulnerability check
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Coverage report
        if: github.event_name == 'pull_request'
        run: |
          total=$(go tool cover -func=coverage.out | grep total | awk '{print $3}')
          echo "## Test Coverage: ${total}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          go tool cover -func=coverage.out >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
